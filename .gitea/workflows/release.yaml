name: Build and Push Docker Image
run-name: Build and push Docker image by ${{ gitea.actor }}
on:
  push:
    tags: ["v*"]

env:
  REGISTRY: danicos.dev
  IMAGE_NAME: daniel/curious-ape

jobs:
  build-and-push:
    runs-on: daniel-act-runner
    # Use a container with Docker pre-installed (recommended for Gitea Actions)
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.CI_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64 # Add more platforms as needed
          cache-from: type=gha
          cache-to: type=gha,mode=max
